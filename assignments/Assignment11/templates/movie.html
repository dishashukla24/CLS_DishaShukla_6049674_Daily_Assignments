<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Movies</title>
</head>

<body style="font-family:Arial; margin:40px;">

    <!-- ✅ Add / Update Movie -->
    <h2 th:text="${isEdit} ? 'Update Movie' : 'Add Movie'"></h2>

    <form th:action="${isEdit} ? @{/updateMovie} : @{/addMovie}"
          th:object="${movie}" method="post">

        <!-- Movie Name -->
        <input type="text" th:field="*{movieName}" placeholder="Movie Name" />
        <span style="color:red"
              th:if="${#fields.hasErrors('movieName')}"
              th:errors="*{movieName}"></span>
        <br><br>

        <!-- Rating -->
        <input type="number" step="0.1" th:field="*{rating}" placeholder="Rating" />
        <span style="color:red"
              th:if="${#fields.hasErrors('rating')}"
              th:errors="*{rating}"></span>
        <br><br>

        <!-- Genre -->
        <select th:field="*{genre}">
            <option value="">--Select Genre--</option>
            <option value="Drama">Drama</option>
            <option value="Fiction">Fiction</option>
            <option value="Satire">Satire</option>
        </select>
        <span style="color:red"
              th:if="${#fields.hasErrors('genre')}"
              th:errors="*{genre}"></span>
        <br><br>

        <button type="submit"
                th:text="${isEdit} ? 'Update' : 'Add'"></button>
    </form>

    <hr>

    <!-- ✅ Search -->
    <h2>Search by Genre</h2>

    <form action="searchMovie" method="post">
        <select name="genre">
            <option value="">--Select Genre--</option>
            <option value="Drama">Drama</option>
            <option value="Fiction">Fiction</option>
            <option value="Satire">Satire</option>
        </select>

        <button type="submit">Search</button>
    </form>

    <hr>

    <!-- ✅ Movie List -->
    <h2>Movie List</h2>

    <table border="1" cellpadding="10">
        <tr>
            <th>Name</th>
            <th>Rating</th>
            <th>Genre</th>
            <th>Action</th>
        </tr>

        <tr th:each="m : ${movies}">
            <td th:text="${m.movieName}"></td>
            <td th:text="${m.rating}"></td>
            <td th:text="${m.genre}"></td>
            <td>
                <!-- ❌ Delete -->
                <a th:href="@{/deleteMovie(name=${m.movieName})}">Delete</a>

                |

                <!-- ✏️ Edit -->
                <a th:href="@{/editMovie(name=${m.movieName})}">Edit</a>
            </td>
        </tr>
    </table>

</body>

</html>
